<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BPE Tokenizer Developer UI</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            margin-top: 0;
            font-size: 24px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
            margin-bottom: 10px;
        }
        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        .section {
            margin-bottom: 30px;
        }
        .stats {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }
        .output {
            padding: 15px;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            min-height: 50px;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
        }
        .token-span {
            display: inline-block;
            padding: 2px 4px;
            margin: 2px;
            border-radius: 3px;
            font-family: monospace;
            cursor: pointer;
            position: relative;
        }
        .token-span:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 10;
        }
        .color-0 { background-color: #e3f2fd; }
        .color-1 { background-color: #f3e5f5; }
        .color-2 { background-color: #e8f5e9; }
        .color-3 { background-color: #fff3e0; }
        
        .space-marker {
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>BPE Tokenizer Developer UI</h1>
        
        <div class="section">
            <h3>Encode Text</h3>
            <textarea id="encodeInput" placeholder="Enter text to tokenize..."></textarea>
            <button onclick="encode()">Encode</button>
            <div id="encodeStats" class="stats"></div>
            <div id="encodeOutput" class="output"></div>
            <div id="tokensList" class="stats" style="margin-top:10px; word-break: break-all;"></div>
        </div>

        <div class="section">
            <h3>Decode Tokens</h3>
            <textarea id="decodeInput" placeholder="Enter comma-separated token IDs (e.g. 1, 45, 23)"></textarea>
            <button onclick="decode()">Decode</button>
            <div id="decodeOutput" class="output" style="margin-top:10px;"></div>
        </div>
    </div>

    <script>
        const baseUrl = '/internal/tokenizer';

        async function encode() {
            const text = document.getElementById('encodeInput').value;
            if (!text) return;

            try {
                const response = await fetch(baseUrl + '/encode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                
                if (!response.ok) throw new Error("Server error (is a model loaded?)");
                const data = await response.json();
                
                document.getElementById('encodeStats').innerText = `Tokens: ${data.tokens.length} | Latency: ${data.timeMs}ms`;
                
                const outputDiv = document.getElementById('encodeOutput');
                outputDiv.innerHTML = '';
                
                data.pieces.forEach((piece, index) => {
                    const span = document.createElement('span');
                    span.className = `token-span color-${index % 4}`;
                    
                    const tokenId = data.tokens[index];
                    span.setAttribute('data-tooltip', `ID: ${tokenId} | Text: '${piece}'`);
                    
                    // Visualize spaces
                    const visiblePiece = piece.replace(/ /g, '<span class="space-marker">·</span>');
                    span.innerHTML = visiblePiece;
                    
                    outputDiv.appendChild(span);
                });
                
                document.getElementById('tokensList').innerText = "[" + data.tokens.join(", ") + "]";
            } catch (e) {
                alert(e.message);
            }
        }

        async function decode() {
            const input = document.getElementById('decodeInput').value;
            if (!input) return;

            const tokens = input.replace(/\[|\]/g, '').split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
            
            try {
                const response = await fetch(baseUrl + '/decode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tokens })
                });
                
                if (!response.ok) throw new Error("Server error");
                const data = await response.json();
                
                document.getElementById('decodeOutput').innerText = data.text;
            } catch (e) {
                alert(e.message);
            }
        }
    </script>
</body>
</html>
